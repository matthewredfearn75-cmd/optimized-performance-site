<svg xmlns="http://www.w3.org/2000/svg" width="1.5in" height="0.5in" viewBox="0 0 432 144">
  <!-- Dark navy background -->
  <rect x="0" y="0" width="432" height="144" rx="6" fill="#0D1B2A"/>

  <!-- Subtle border -->
  <rect x="2" y="2" width="428" height="140" rx="5" fill="none" stroke="#00B4D8" stroke-width="1" opacity="0.4"/>

  <!-- Left section divider -->
  <line x1="105" y1="14" x2="105" y2="130" stroke="#00B4D8" stroke-width="0.8" opacity="0.25"/>

  <!-- === LEFT: Brand Logo === -->
  <g transform="translate(54, 50)">
    <!-- Outer hexagon -->
    <polygon points="0,-28 24.2,-14 24.2,14 0,28 -24.2,14 -24.2,-14" fill="none" stroke="#00B4D8" stroke-width="1.2" opacity="0.25"/>
    <!-- Mid hexagon -->
    <polygon points="0,-18 15.6,-9 15.6,9 0,18 -15.6,9 -15.6,-9" fill="none" stroke="#00B4D8" stroke-width="1.2" opacity="0.5"/>
    <!-- Inner hexagon -->
    <polygon points="0,-10 8.7,-5 8.7,5 0,10 -8.7,5 -8.7,-5" fill="none" stroke="#00B4D8" stroke-width="1.5" opacity="0.8"/>
    <!-- Vertex dots -->
    <circle cx="0" cy="-28" r="2" fill="#00B4D8" opacity="0.6"/>
    <circle cx="24.2" cy="-14" r="2" fill="#00B4D8" opacity="0.5"/>
    <circle cx="24.2" cy="14" r="2" fill="#0077B6" opacity="0.5"/>
    <circle cx="0" cy="28" r="2" fill="#0077B6" opacity="0.6"/>
    <circle cx="-24.2" cy="14" r="2" fill="#0077B6" opacity="0.5"/>
    <circle cx="-24.2" cy="-14" r="2" fill="#00B4D8" opacity="0.5"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3.5" fill="#00B4D8"/>
    <circle cx="0" cy="0" r="1.8" fill="#0D1B2A"/>
    <!-- Corner triangles -->
    <polygon points="0,-25 6,-18 -6,-18" fill="none" stroke="#00B4D8" stroke-width="0.8" opacity="0.6"/>
    <polygon points="0,25 6,18 -6,18" fill="none" stroke="#0077B6" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Brand text -->
  <text x="54" y="94" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7.5" font-weight="700" fill="#FFFFFF" letter-spacing="1.8">OPTIMIZED</text>
  <text x="54" y="104" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="5.5" font-weight="400" fill="#90CAF9" letter-spacing="2.2">PERFORMANCE</text>

  <!-- === RIGHT: Product Info === -->

  <!-- Product name -->
  <text x="122" y="37" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="800" fill="#FFFFFF" letter-spacing="1.5">GLP-3</text>

  <!-- Cyan accent line under name -->
  <line x1="122" y1="44" x2="260" y2="44" stroke="#00B4D8" stroke-width="1.5" opacity="0.6"/>

  <!-- Descriptor -->
  <text x="122" y="60" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="400" fill="#90CAF9" letter-spacing="0.5">Triple Agonist Peptide</text>

  <!-- Dosage + format -->
  <text x="122" y="78" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#00B4D8" letter-spacing="0.5">10 mg</text>
  <text x="178" y="78" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="400" fill="#7BA3C4">Lyophilized Powder</text>

  <!-- Purity + storage -->
  <text x="122" y="95" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="600" fill="#FFFFFF" opacity="0.85" letter-spacing="0.3">Purity: &gt;99%</text>
  <text x="224" y="95" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="400" fill="#7BA3C4">Store at -20&#xB0;C</text>

  <!-- Thin divider -->
  <line x1="122" y1="104" x2="420" y2="104" stroke="#00B4D8" stroke-width="0.5" opacity="0.2"/>

  <!-- RUO disclaimer -->
  <text x="122" y="118" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" font-weight="600" fill="#00B4D8" opacity="0.7" letter-spacing="0.8">FOR RESEARCH USE ONLY</text>

  <!-- Lot + SKU -->
  <text x="122" y="132" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" font-weight="400" fill="#7BA3C4" opacity="0.5">Lot: __________</text>
  <text x="420" y="132" text-anchor="end" font-family="'Helvetica Neue', Arial, sans-serif" font-size="6" font-weight="400" fill="#7BA3C4" opacity="0.4">OP-GLP3-10MG | 2 mL vial</text>
</svg>
